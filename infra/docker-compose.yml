# Docker Compose для локальной разработки
# Запуск: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: rmg-postgres
    environment:
      POSTGRES_USER: rmg
      POSTGRES_PASSWORD: rmg_secret
      POSTGRES_DB: rmg_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rmg -d rmg_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rmg-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
